# ──────────────────────────────────────────────────────────────────────────────
# ClusterRole for the Clustral Agent
#
# The Agent uses the Kubernetes Impersonation API to forward user identity
# from the Clustral ControlPlane to the k8s API server. This means the
# Agent's ServiceAccount only needs the "impersonate" verb — actual
# authorization is enforced by k8s RBAC based on the impersonated user.
#
# Cluster admins must create RoleBindings/ClusterRoleBindings for each
# Clustral user (by email) to grant them the appropriate k8s permissions.
#
# Example — grant a user read access to a namespace:
#
#   kubectl create rolebinding dev-reader \
#     --clusterrole=view \
#     --user=dev@clustral.local \
#     --namespace=default
#
# Example — grant a user cluster-admin access:
#
#   kubectl create clusterrolebinding admin-full \
#     --clusterrole=cluster-admin \
#     --user=admin@clustral.local
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clustral-agent
  labels:
    app.kubernetes.io/name: clustral-agent
    app.kubernetes.io/component: agent
rules:
  # Impersonation — allows the agent to act as any user or group.
  # The k8s API server then enforces RBAC for the impersonated identity.
  - apiGroups: [""]
    resources:
      - users
      - groups
      - serviceaccounts
    verbs: ["impersonate"]

  # Required for the agent's own heartbeat (ClusterService.UpdateStatus).
  # This is the agent calling as itself, not impersonating.
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get", "list"]
