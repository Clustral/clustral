server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # CLI discovery endpoint — proxied to ControlPlane.
    # clustral login app.clustral.dev → fetches this automatically.
    location = /.well-known/clustral-configuration {
        proxy_pass         http://controlplane:5000/api/v1/config;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # kubectl proxy — forwards /proxy/{clusterId}/* to ControlPlane tunnel.
    location /proxy/ {
        proxy_pass         http://controlplane:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # Reverse proxy /api to the ControlPlane.
    location /api/ {
        proxy_pass         http://controlplane:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback — serve index.html for all non-file routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
