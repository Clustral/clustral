name: Helm Charts

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm.yml"
      - "ct.yaml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm.yml"
      - "ct.yaml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint & template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Build dependencies
        run: helm dependency build charts/clustral

      - name: Lint agent chart
        run: helm lint charts/agent

      - name: Lint platform chart
        run: helm lint charts/clustral

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Template + validate agent chart
        run: |
          helm template test-agent charts/agent \
            -f charts/agent/ci/test-values.yaml \
            | kubeconform -strict -summary -ignore-missing-schemas

      - name: Template + validate platform chart
        run: |
          helm template test-platform charts/clustral \
            -f charts/clustral/ci/test-values.yaml \
            | kubeconform -strict -summary -ignore-missing-schemas

  release:
    name: Publish Helm Registry
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint
    runs-on: ubuntu-latest
    environment:
      name: helm-registry
      url: https://clustral.github.io/clustral
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stamp chart versions from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for chart in charts/*/Chart.yaml; do
            sed -i "s/^version:.*/version: $VERSION/" "$chart"
            sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" "$chart"
            echo "Stamped $chart → $VERSION"
          done

      - name: Build chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build charts/clustral

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
