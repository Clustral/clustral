name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-dotnet:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Clustral.slnx

      - name: Build
        run: dotnet build Clustral.slnx --no-restore -c Release

      - name: Test
        run: dotnet test Clustral.slnx --no-build -c Release

  build-web:
    name: Build (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: src/Clustral.Web
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: src/Clustral.Web
        run: bun run tsc --noEmit

      - name: Build
        working-directory: src/Clustral.Web
        run: bun run build
