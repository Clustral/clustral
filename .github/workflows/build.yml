name: Build & Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "src/Clustral.ControlPlane/**"
      - "src/Clustral.ApiGateway/**"
      - "src/Clustral.AuditService/**"
      - "src/Clustral.Cli/**"
      - "src/Clustral.Web/**"
      - "src/clustral-agent/**"
      - "src/clustral-tunnel/**"
      - "Clustral.slnx"
      - "Directory.Packages.props"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "src/Clustral.ControlPlane/**"
      - "src/Clustral.ApiGateway/**"
      - "src/Clustral.AuditService/**"
      - "src/Clustral.Cli/**"
      - "src/Clustral.Web/**"
      - "src/clustral-agent/**"
      - "src/clustral-tunnel/**"
      - "Clustral.slnx"
      - "Directory.Packages.props"
      - ".github/workflows/build.yml"

permissions:
  contents: read
  checks: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      web: ${{ steps.filter.outputs.web }}
      agent: ${{ steps.filter.outputs.agent }}
      tunnel: ${{ steps.filter.outputs.tunnel }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dotnet:
              - "packages/**"
              - "src/Clustral.ControlPlane/**"
              - "src/Clustral.ApiGateway/**"
              - "src/Clustral.AuditService/**"
              - "src/Clustral.Cli/**"
              - "Clustral.slnx"
              - "Directory.Packages.props"
            web:
              - "src/Clustral.Web/**"
              - "packages/**"
            agent:
              - "src/clustral-agent/**"
              - "packages/proto/**"
            tunnel:
              - "src/clustral-tunnel/**"
              - "packages/proto/**"

  build-dotnet:
    name: Build & Test (.NET)
    needs: changes
    if: needs.changes.outputs.dotnet == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Clustral.slnx

      - name: Build
        run: dotnet build Clustral.slnx --no-restore -c Release

      # Docker is available on ubuntu-latest runners.
      # Testcontainers (used by ControlPlane integration tests) requires it.
      - name: Test
        run: |
          dotnet test Clustral.slnx --no-build -c Release \
            --logger "trx;LogFileName=results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Test Results
          path: "TestResults/**/*.trx"
          reporter: dotnet-trx

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: TestResults/**/coverage.cobertura.xml

  build-agent:
    name: Build & Test (Agent/Go)
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        working-directory: src/clustral-agent
        run: go build ./...

      - name: Test
        working-directory: src/clustral-agent
        run: go test -race -coverprofile=coverage.out -v ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: src/clustral-agent/coverage.out

  build-tunnel:
    name: Build & Test (TunnelService/Go)
    needs: changes
    if: needs.changes.outputs.tunnel == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build
        working-directory: src/clustral-tunnel
        run: go build ./...
      - name: Test
        working-directory: src/clustral-tunnel
        run: go test -race -coverprofile=coverage.out -v ./...
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-coverage
          path: src/clustral-tunnel/coverage.out

  build-web:
    name: Build (Web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: src/Clustral.Web
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: src/Clustral.Web
        run: bun run tsc --noEmit

      - name: Build
        working-directory: src/Clustral.Web
        run: bun run build

  # Gate job — always runs, always reports a status. Branch protection
  # requires this job (not the conditional build jobs above) so PRs that
  # only touch docs, workflows, or charts aren't stuck waiting forever.
  ci-gate:
    name: CI Gate
    if: always()
    needs: [build-dotnet, build-agent, build-tunnel, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          # Fail if any needed job failed (not just skipped).
          results=("${{ needs.build-dotnet.result }}" "${{ needs.build-agent.result }}" "${{ needs.build-tunnel.result }}" "${{ needs.build-web.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped — CI gate OK"
