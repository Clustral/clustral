name: Build & Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "src/Clustral.ControlPlane/**"
      - "src/Clustral.Agent/**"
      - "src/Clustral.Cli/**"
      - "src/Clustral.Web/**"
      - "Clustral.slnx"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "src/Clustral.ControlPlane/**"
      - "src/Clustral.Agent/**"
      - "src/Clustral.Cli/**"
      - "src/Clustral.Web/**"
      - "Clustral.slnx"
      - ".github/workflows/build.yml"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      web: ${{ steps.filter.outputs.web }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dotnet:
              - "packages/**"
              - "src/Clustral.ControlPlane/**"
              - "src/Clustral.Cli/**"
              - "Clustral.slnx"
            web:
              - "src/Clustral.Web/**"
              - "packages/**"
            agent:
              - "src/clustral-agent/**"
              - "packages/proto/**"

  build-dotnet:
    name: Build & Test (.NET)
    needs: changes
    if: needs.changes.outputs.dotnet == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Clustral.slnx

      - name: Build
        run: dotnet build Clustral.slnx --no-restore -c Release

      - name: Test
        run: dotnet test Clustral.slnx --no-build -c Release

  build-agent:
    name: Build & Test (Agent/Go)
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        working-directory: src/clustral-agent
        run: go build ./...

      - name: Test
        working-directory: src/clustral-agent
        run: go test ./...

  build-web:
    name: Build (Web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: src/Clustral.Web
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: src/Clustral.Web
        run: bun run tsc --noEmit

      - name: Build
        working-directory: src/Clustral.Web
        run: bun run build
