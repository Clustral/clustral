name: Release Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "src/Clustral.ControlPlane/**"
      - "src/Clustral.Agent/**"
      - "src/Clustral.Web/**"
      - ".github/workflows/release.yml"
    tags: ["v*"]

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    # On tags, build everything. On branch pushes, only changed images.
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    outputs:
      controlplane: ${{ steps.filter.outputs.controlplane }}
      agent: ${{ steps.filter.outputs.agent }}
      web: ${{ steps.filter.outputs.web }}
      is_tag: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            controlplane:
              - "packages/**"
              - "src/Clustral.ControlPlane/**"
            agent:
              - "packages/proto/**"
              - "src/clustral-agent/**"
            web:
              - "src/Clustral.Web/**"

  controlplane:
    name: ControlPlane Image
    needs: changes
    if: needs.changes.outputs.is_tag == 'true' || needs.changes.outputs.controlplane == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/clustral-controlplane
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') && !startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=alpha,enable=${{ contains(github.ref_name, '-alpha') }}
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-beta') }}
            type=raw,value=rc,enable=${{ contains(github.ref_name, '-rc') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Clustral.ControlPlane/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name != '' && startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0-dev' }}
          cache-from: type=gha,scope=controlplane
          cache-to: type=gha,mode=max,scope=controlplane

  agent:
    name: Agent Image
    needs: changes
    if: needs.changes.outputs.is_tag == 'true' || needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/clustral-agent
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') && !startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=alpha,enable=${{ contains(github.ref_name, '-alpha') }}
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-beta') }}
            type=raw,value=rc,enable=${{ contains(github.ref_name, '-rc') }}
      - uses: docker/build-push-action@v6
        with:
          context: src/clustral-agent
          file: src/clustral-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name != '' && startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0-dev' }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

  web:
    name: Web Image
    needs: changes
    if: needs.changes.outputs.is_tag == 'true' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/clustral-web
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') && !startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=alpha,enable=${{ contains(github.ref_name, '-alpha') }}
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-beta') }}
            type=raw,value=rc,enable=${{ contains(github.ref_name, '-rc') }}
      - uses: docker/build-push-action@v6
        with:
          context: src/Clustral.Web
          file: src/Clustral.Web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
