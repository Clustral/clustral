name: Release Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "src/Clustral.ControlPlane/**"
      - "src/Clustral.ApiGateway/**"
      - "src/Clustral.AuditService/**"
      - "src/Clustral.Agent/**"
      - "src/clustral-tunnel/**"
      - "src/Clustral.Web/**"
      - ".github/workflows/release.yml"
    tags: ["v*"]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    # On tags, build everything. On branch pushes, only changed images.
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    outputs:
      controlplane: ${{ steps.filter.outputs.controlplane }}
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      audit_service: ${{ steps.filter.outputs.audit_service }}
      agent: ${{ steps.filter.outputs.agent }}
      tunnel: ${{ steps.filter.outputs.tunnel }}
      web: ${{ steps.filter.outputs.web }}
      is_tag: ${{ startsWith(github.ref, 'refs/tags/') }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            controlplane:
              - "packages/**"
              - "src/Clustral.ControlPlane/**"
            api_gateway:
              - "packages/**"
              - "src/Clustral.ApiGateway/**"
            audit_service:
              - "packages/**"
              - "src/Clustral.AuditService/**"
            agent:
              - "packages/proto/**"
              - "src/clustral-agent/**"
            tunnel:
              - "packages/proto/**"
              - "src/clustral-tunnel/**"
            web:
              - "src/Clustral.Web/**"
      - name: Compute version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

  controlplane:
    name: ControlPlane Image
    needs: changes
    if: needs.changes.outputs.is_tag == 'true' || needs.changes.outputs.controlplane == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/clustral-controlplane
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') && !startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=alpha,enable=${{ contains(github.ref_name, '-alpha') }}
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-beta') }}
            type=raw,value=rc,enable=${{ contains(github.ref_name, '-rc') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Clustral.ControlPlane/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ needs.changes.outputs.version }}
          cache-from: type=gha,scope=controlplane
          cache-to: type=gha,mode=max,scope=controlplane

  api-gateway:
    name: API Gateway Image
    needs: changes
    if: needs.changes.outputs.is_tag == 'true' || needs.changes.outputs.api_gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/clustral-api-gateway
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') && !startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=alpha,enable=${{ contains(github.ref_name, '-alpha') }}
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-beta') }}
            type=raw,value=rc,enable=${{ contains(github.ref_name, '-rc') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Clustral.ApiGateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ needs.changes.outputs.version }}
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway

  audit-service:
    name: Audit Service Image
    needs: changes
    if: needs.changes.outputs.is_tag == 'true' || needs.changes.outputs.audit_service == 'true'
    runs-on: ubuntu-latest
    permissions:
