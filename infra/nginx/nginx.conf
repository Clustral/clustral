worker_processes auto;

events {
    worker_connections 1024;
}

# ─────────────────────────────────────────────────────────────────────────────
# NOTE: gRPC traffic (:5443) is NOT proxied through nginx.
# Agents connect directly to Kestrel :5443 (mTLS).
# nginx only handles HTTP/HTTPS traffic (:443) for REST API and Web UI.
#
# Reason: nginx's L4 TCP proxy for persistent gRPC tunnels causes
# intermittent connection drops. Restarting nginx kills the tunnel and the
# ControlPlane proxy stops working even though the agent is connected.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# L7 HTTP reverse proxy — REST API + Web UI
# ─────────────────────────────────────────────────────────────────────────────
http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;

        # ── NextAuth — must come before /api/ catch-all ─────────────────
        location /api/auth/ {
            proxy_pass         http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }

        # ── API Gateway (YARP) — all API traffic ────────────────────────
        location /api/ {
            proxy_pass         http://api-gateway:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_buffering    off;
        }

        # ── API Gateway — health checks ─────────────────────────────────
        location /healthz {
            proxy_pass         http://api-gateway:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_read_timeout 10s;
        }

        # ── API Gateway — audit API ─────────────────────────────────────
        location /audit-api/ {
            proxy_pass         http://api-gateway:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_buffering    off;
        }

        # ── Web UI (everything else: pages, NextAuth, discovery) ─────────
        location / {
            proxy_pass         http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_buffering    off;
        }
    }
}
