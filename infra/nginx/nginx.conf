worker_processes auto;

events {
    worker_connections 1024;
}

# ─────────────────────────────────────────────────────────────────────────────
# L4 TCP proxy — gRPC tunnel (stream module)
#
# Pure TCP passthrough — nginx does not parse HTTP/2 frames, inject timeouts,
# or interfere with the gRPC stream in any way. This is correct for a
# persistent bidirectional tunnel that must stay open indefinitely.
# ─────────────────────────────────────────────────────────────────────────────
stream {
    # gRPC over TLS (:5443) — production
    server {
        listen 5443 ssl;

        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;

        proxy_pass controlplane:5001;
    }

    # gRPC plaintext (:5444) — local dev
    server {
        listen 5444;

        proxy_pass controlplane:5001;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# L7 HTTP reverse proxy — REST API + Web UI
# ─────────────────────────────────────────────────────────────────────────────
http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;

        # ── ControlPlane REST API (CLI + kubectl) ────────────────────────
        location /api/v1/ {
            proxy_pass         http://controlplane:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_buffering    off;
        }

        # ── ControlPlane kubectl proxy ───────────────────────────────────
        location /api/proxy/ {
            proxy_pass         http://controlplane:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_buffering    off;
        }

        # ── ControlPlane health checks ───────────────────────────────────
        location /healthz {
            proxy_pass         http://controlplane:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_read_timeout 10s;
        }

        # ── Web UI (everything else: pages, NextAuth, discovery) ─────────
        location / {
            proxy_pass         http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_buffering    off;
        }
    }
}
