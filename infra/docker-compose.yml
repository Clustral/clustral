# Infrastructure services for Clustral.
#
# Run separately from the application stack:
#   docker compose -f infra/docker-compose.yml up -d
#
# These services are optional — you can use your own MongoDB, Keycloak,
# or HTTPS proxy instead.

services:

  # ──────────────────────────────────────────────────────────────────────────
  # MongoDB 8
  # ──────────────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────────────────────
  # Keycloak 24 (dev mode)
  #
  # On first run, imports the realm from keycloak/clustral-realm.json.
  # Pre-configured clients: clustral-control-plane, clustral-cli, clustral-web
  # Default users: admin/admin (clustral-admin), dev/dev (clustral-user)
  # ──────────────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: >
      start-dev
      --import-realm
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT:            8080
      KC_HOSTNAME_STRICT:      "false"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  # ──────────────────────────────────────────────────────────────────────────
  # HTTPS reverse proxy (nginx)
  #
  # Terminates TLS on port 443 and forwards to the Web UI (Next.js) on
  # port 3000. Generates a self-signed cert on first start.
  #
  # This requires the application stack to be on the same Docker network.
  # The main docker-compose.yml creates the network "clustral_default".
  # ──────────────────────────────────────────────────────────────────────────
  ssl-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs
      # Optional: mount your own certs.
      # - ./certs/tls.crt:/etc/nginx/certs/tls.crt:ro
      # - ./certs/tls.key:/etc/nginx/certs/tls.key:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ ! -f /etc/nginx/certs/tls.crt ]; then
          echo "Generating self-signed certificate..."
          apk add --no-cache openssl > /dev/null 2>&1
          openssl req -x509 -nodes -days 365 \
            -newkey rsa:2048 \
            -keyout /etc/nginx/certs/tls.key \
            -out /etc/nginx/certs/tls.crt \
            -subj "/CN=clustral" \
            -addext "subjectAltName=DNS:clustral,DNS:localhost,IP:0.0.0.0" \
            2>/dev/null
          echo "Self-signed certificate generated."
        fi
        exec nginx -g "daemon off;"
    networks:
      - clustral

volumes:
  mongo_data:
  certs:

networks:
  clustral:
    external: true
    name: clustral_default
