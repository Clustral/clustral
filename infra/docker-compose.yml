# Infrastructure services for Clustral.
#
# Run separately from the application stack:
#   docker compose -f infra/docker-compose.yml up -d
#
# These services are optional — you can use your own MongoDB, Keycloak,
# or HTTPS proxy instead.

services:

  # ──────────────────────────────────────────────────────────────────────────
  # MongoDB 8
  # ──────────────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clustral

  # ──────────────────────────────────────────────────────────────────────────
  # Keycloak 24 (dev mode)
  #
  # On first run, imports the realm from keycloak/clustral-realm.json.
  # Pre-configured clients: clustral-control-plane, clustral-cli, clustral-web
  # Default users: admin/admin (clustral-admin), dev/dev (clustral-user)
  # ──────────────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: >
      start-dev
      --import-realm
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT:            8080
      KC_HOSTNAME_STRICT:      "false"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - clustral

  # ──────────────────────────────────────────────────────────────────────────
  # Reverse proxy (nginx)
  #
  # :443  — HTTPS: REST API + kubectl proxy → ControlPlane, everything
  #         else → Web UI (pages, NextAuth, CLI discovery)
  # :5443 — gRPC over TLS: agent tunnel, heartbeat, credential services
  #         → ControlPlane gRPC
  #
  # Generates a self-signed cert on first start.
  # This requires the application stack to be on the same Docker network.
  # The main docker-compose.yml creates the network "clustral_default".
  # ──────────────────────────────────────────────────────────────────────────
  ssl-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      # gRPC :5443 is NOT proxied through nginx — agents connect directly to Kestrel.
      # Removed :5443 and :5444 to prevent nginx from interfering with persistent tunnels.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/nginx/certs
      # Optional: mount your own certs.
      # - ./certs/tls.crt:/etc/nginx/certs/tls.crt:ro
      # - ./certs/tls.key:/etc/nginx/certs/tls.key:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ ! -f /etc/nginx/certs/tls.crt ]; then
          echo "Generating self-signed certificate..."
          apk add --no-cache openssl > /dev/null 2>&1
          openssl req -x509 -nodes -days 365 \
            -newkey rsa:2048 \
            -keyout /etc/nginx/certs/tls.key \
            -out /etc/nginx/certs/tls.crt \
            -subj "/CN=clustral" \
            -addext "subjectAltName=DNS:clustral,DNS:localhost,IP:0.0.0.0" \
            2>/dev/null
          echo "Self-signed certificate generated."
        fi
        exec nginx -g "daemon off;"
    networks:
      - clustral

  # ──────────────────────────────────────────────────────────────────────────
  # RabbitMQ 4 (message broker for integration events)
  #
  # Management UI: http://localhost:15672 (clustral/clustral)
  # AMQP: localhost:5672
  # ──────────────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: clustral
      RABBITMQ_DEFAULT_PASS: clustral
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - clustral

  # ──────────────────────────────────────────────────────────────────────────
  # Observability stack (Prometheus + Loki + Tempo + Grafana)
  #
  # Grafana: http://localhost:3001 (admin/clustral)
  # Prometheus: http://localhost:9090
  # ──────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - clustral

  loki:
    image: grafana/loki:3.4
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - clustral

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo/traces
    networks:
      - clustral

  grafana:
    image: grafana/grafana:12.0.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: clustral
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - clustral

volumes:
  mongo_data:
  certs:
  tempo_data:
  grafana_data:

networks:
  clustral:
    name: clustral_default
