global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: controlplane
    static_configs:
      - targets: ['controlplane:5100']
    metrics_path: /metrics

  - job_name: audit-service
    static_configs:
      - targets: ['audit-service:5200']
    metrics_path: /metrics
