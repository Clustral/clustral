# Clustral application stack.
#
# Start infrastructure first:
#   docker compose -f infra/docker-compose.yml up -d
#
# Then start the application:
#   docker compose up -d

services:

  # ──────────────────────────────────────────────────────────────────────────
  # Clustral ControlPlane (ASP.NET Core — REST + gRPC)
  # ──────────────────────────────────────────────────────────────────────────
  controlplane:
    build:
      context: .
      dockerfile: src/Clustral.ControlPlane/Dockerfile
    restart: unless-stopped
    labels:
      - "service=controlplane"
    networks:
      - clustral
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: "mongodb://mongo:27017"
      MongoDB__DatabaseName: "clustral"
      Oidc__Authority: "http://192.168.88.4:8080/realms/clustral"
      Oidc__MetadataAddress: "http://192.168.88.4:8080/realms/clustral/.well-known/openid-configuration"
      Oidc__ClientId: "clustral-control-plane"
      Oidc__Audience: "clustral-control-plane"
      Oidc__RequireHttpsMetadata: "false"
      CertificateAuthority__CaCertPath: "/etc/clustral/ca/ca.crt"
      CertificateAuthority__CaKeyPath: "/etc/clustral/ca/ca.key"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__User: "clustral"
      RabbitMQ__Pass: "clustral"
      OpenTelemetry__ServiceName: "clustral-controlplane"
      OpenTelemetry__OtlpEndpoint: "http://tempo:4317"
      OpenTelemetry__LogsEndpoint: "http://loki:3100/otlp"
    ports:
      # gRPC mTLS — agents connect directly (not through nginx)
      - "5443:5443"
    volumes:
      - ./infra/ca:/etc/clustral/ca:ro
    # REST :5100 and legacy gRPC :5101 are internal — nginx handles REST via :443.
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:5100/healthz/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────────
  # Clustral Web UI (Next.js)
  # ──────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: src/Clustral.Web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - clustral
    environment:
      NEXTAUTH_URL: "https://192.168.88.4"
      CONTROLPLANE_URL: "http://controlplane:5100"
      CONTROLPLANE_PUBLIC_URL: "https://192.168.88.4"
      OIDC_ISSUER: "http://192.168.88.4:8080/realms/clustral"
      OIDC_CLIENT_ID: "clustral-web"
      OIDC_CLIENT_SECRET: "clustral-web-secret"
      AUTH_SECRET: "lXBA6UgneVKkAZSlKqDqLTuXigHVoScA"
      AUDIT_SERVICE_URL: "http://audit-service:5200"
      NODE_ENV: "production"
    # No ports exposed — nginx handles all external traffic.
    # Uncomment for direct access during local dev without nginx:
    # ports:
    #   - "3000:3000"

  # ──────────────────────────────────────────────────────────────────────────
  # Clustral Audit Service (ASP.NET Core — event consumer + REST API)
  # ──────────────────────────────────────────────────────────────────────────
  audit-service:
    build:
      context: .
      dockerfile: src/Clustral.AuditService/Dockerfile
    restart: unless-stopped
    labels:
      - "service=audit-service"
    networks:
      - clustral
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: "mongodb://mongo:27017"
      MongoDB__DatabaseName: "clustral-audit"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__User: "clustral"
      RabbitMQ__Pass: "clustral"
      OpenTelemetry__ServiceName: "clustral-audit-service"
      OpenTelemetry__OtlpEndpoint: "http://tempo:4317"
      OpenTelemetry__LogsEndpoint: "http://loki:3100/otlp"
    ports:
      - "5200:5200"
    # RabbitMQ runs in infra/docker-compose.yml on the same network.
    # MassTransit retries connection automatically if RabbitMQ isn't ready yet.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5200/swagger || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

networks:
  clustral:
    external: true
    name: clustral_default