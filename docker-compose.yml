# Clustral application stack.
#
# Start infrastructure first:
#   docker compose -f infra/docker-compose.yml up -d
#
# Then start the application:
#   docker compose up -d

services:

  # ──────────────────────────────────────────────────────────────────────────
  # Clustral ControlPlane (ASP.NET Core — REST + gRPC)
  # ──────────────────────────────────────────────────────────────────────────
  controlplane:
    build:
      context: .
      dockerfile: src/Clustral.ControlPlane/Dockerfile
    restart: unless-stopped
    networks:
      - clustral
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Clustral: "mongodb://mongo:27017"
      MongoDB__DatabaseName: "clustral"
      Keycloak__Authority: "http://192.168.88.17:8080/realms/clustral"
      Keycloak__MetadataAddress: "http://192.168.88.17:8080/realms/clustral/.well-known/openid-configuration"
      Keycloak__ClientId: "clustral-control-plane"
      Keycloak__Audience: "clustral-control-plane"
      Keycloak__RequireHttpsMetadata: "false"
    ports:
      - "5100:5000"
      - "5101:5001"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:5000/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────────
  # Clustral Web UI (Next.js)
  # ──────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: src/Clustral.Web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - clustral
    environment:
      NEXTAUTH_URL: "http://192.168.88.17:3000"
      CONTROLPLANE_URL: "http://192.168.88.17:5100"
      OIDC_ISSUER: "http://192.168.88.17:8080/realms/clustral"
      OIDC_CLIENT_ID: "clustral-web"
      OIDC_CLIENT_SECRET: "clustral-web-secret"
      AUTH_SECRET: "lXBA6UgneVKkAZSlKqDqLTuXigHVoScA"
      NODE_ENV: "production"
    ports:
      - "3000:3000"

networks:
  clustral:
    external: true
    name: clustral_default