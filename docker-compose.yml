# Clustral application stack.
#
# Start infrastructure first:
#   docker compose -f infra/docker-compose.yml up -d
#
# Then start the application:
#   docker compose up -d

services:

  # ──────────────────────────────────────────────────────────────────────────
  # Clustral ControlPlane (ASP.NET Core — REST + gRPC)
  # ──────────────────────────────────────────────────────────────────────────
  controlplane:
    build:
      context: .
      dockerfile: src/Clustral.ControlPlane/Dockerfile
    restart: unless-stopped
    networks:
      - clustral
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: "mongodb://mongo:27017"
      MongoDB__DatabaseName: "clustral"
      Oidc__Authority: "http://192.168.88.6:8080/realms/clustral"
      Oidc__MetadataAddress: "http://192.168.88.6:8080/realms/clustral/.well-known/openid-configuration"
      Oidc__ClientId: "clustral-control-plane"
      Oidc__Audience: "clustral-control-plane"
      Oidc__RequireHttpsMetadata: "false"
      CertificateAuthority__CaCertPath: "/etc/clustral/ca/ca.crt"
      CertificateAuthority__CaKeyPath: "/etc/clustral/ca/ca.key"
    ports:
      # gRPC mTLS — agents connect directly (not through nginx)
      - "5443:5443"
    volumes:
      - ./infra/ca:/etc/clustral/ca:ro
    # REST :5000 and legacy gRPC :5001 are internal — nginx handles REST via :443.
    # Uncomment for direct access during local dev without nginx:
    # ports:
    #   - "5100:5000"
    #   - "5101:5001"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:5000/healthz/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────────
  # Clustral Web UI (Next.js)
  # ──────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: src/Clustral.Web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - clustral
    environment:
      NEXTAUTH_URL: "https://192.168.88.6"
      CONTROLPLANE_URL: "http://controlplane:5000"
      CONTROLPLANE_PUBLIC_URL: "https://192.168.88.6"
      OIDC_ISSUER: "http://192.168.88.6:8080/realms/clustral"
      OIDC_CLIENT_ID: "clustral-web"
      OIDC_CLIENT_SECRET: "clustral-web-secret"
      AUTH_SECRET: "lXBA6UgneVKkAZSlKqDqLTuXigHVoScA"
      NODE_ENV: "production"
    # No ports exposed — nginx handles all external traffic.
    # Uncomment for direct access during local dev without nginx:
    # ports:
    #   - "3000:3000"

networks:
  clustral:
    external: true
    name: clustral_default