services:

  # ──────────────────────────────────────────────────────────────────────────
  # MongoDB 8
  # ──────────────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────────────────────
  # Keycloak 24 (dev mode — no TLS, in-memory H2 storage)
  #
  # On first run Keycloak imports the realm from infra/keycloak/.
  # The "clustral" realm is pre-configured with:
  #   - client: clustral-control-plane  (bearer-only, for token validation)
  #   - client: clustral-cli            (public, PKCE flow)
  #   - client: clustral-web            (public, browser OIDC)
  #   - users:  admin/admin, dev/dev
  # ──────────────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: >
      start-dev
      --import-realm
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT:            8080
      KC_HOSTNAME:             localhost
      KC_HOSTNAME_PORT:        8080
      KC_HOSTNAME_STRICT:      "false"
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  # ──────────────────────────────────────────────────────────────────────────
  # Clustral ControlPlane (ASP.NET Core — REST + gRPC)
  # ──────────────────────────────────────────────────────────────────────────
  controlplane:
    build:
      context: .
      dockerfile: src/Clustral.ControlPlane/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Clustral: "mongodb://mongo:27017"
      MongoDB__DatabaseName: "clustral"
      Keycloak__Authority: "http://localhost:8080/realms/clustral"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/clustral/.well-known/openid-configuration"
      Keycloak__ClientId: "clustral-control-plane"
      Keycloak__Audience: "clustral-control-plane"
      Keycloak__RequireHttpsMetadata: "false"
    ports:
      - "5100:5000"   # Host :5100 → container :5000 (avoids macOS AirPlay on :5000)
      - "5101:5001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────────
  # Clustral Web UI (Vite + React, served by nginx)
  # ──────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: src/Clustral.Web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      controlplane:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  mongo_data:
