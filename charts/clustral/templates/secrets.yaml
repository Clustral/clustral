{{- if not .Values.certManager.enabled }}
# ── Manual Secrets ─────────────────────────────────────────────────────────
#
# When certManager.enabled is false, create these Secrets before installing:
#
#   kubectl create secret generic {{ .Values.secrets.ca }} \
#     --from-file=ca.crt=path/to/ca.crt \
#     --from-file=ca.key=path/to/ca.key
#
#   kubectl create secret generic {{ .Values.secrets.internalJwt }} \
#     --from-file=private.pem=path/to/internal-jwt-private.pem \
#     --from-file=public.pem=path/to/internal-jwt-public.pem
#
#   kubectl create secret generic {{ .Values.secrets.kubeconfigJwt }} \
#     --from-file=private.pem=path/to/kubeconfig-jwt-private.pem \
#     --from-file=public.pem=path/to/kubeconfig-jwt-public.pem
#
#   kubectl create secret tls {{ .Values.secrets.tls }} \
#     --cert=path/to/tls.crt \
#     --key=path/to/tls.key
#
# Or run: charts/clustral/scripts/generate-secrets.sh
#
{{- end }}
