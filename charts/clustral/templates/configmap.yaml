apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clustral.fullname" . }}-shared
  labels:
    {{- include "clustral.labels" . | nindent 4 }}
data:
  # Base URL for error documentation links in RFC 7807 responses and
  # plain-text error Link headers. Point at an internal mirror for
  # air-gapped deployments.
  ERRORS_DOCS_BASE_URL: {{ .Values.controlplane.env.errorsDocsBaseUrl | quote }}
