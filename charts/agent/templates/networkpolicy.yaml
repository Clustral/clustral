{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clustral-agent.fullname" . }}
  labels:
    {{- include "clustral-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "clustral-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # Control plane gRPC mTLS (port 5443)
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.controlPlaneCidr | default "0.0.0.0/0" }}
      ports:
        - protocol: TCP
          port: 5443
    # In-cluster Kubernetes API (port 443)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Cluster DNS (UDP 53)
    - to: []
      ports:
        - protocol: UDP
          port: 53
{{- end }}
