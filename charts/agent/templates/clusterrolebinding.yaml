{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "clustral-agent.fullname" . }}
  labels:
    {{- include "clustral-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "clustral-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "clustral-agent.fullname" . }}
{{- end }}
